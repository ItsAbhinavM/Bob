apiVersion: apps/v1
kind: Deployment
metadata:
  name: bob-frontend-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: bob-frontend

  template:
    metadata:
      labels:
        app: bob-frontend

    spec:
      containers:
      - name: bob-frontend

        image: itsabhinavm/bob-frontend:latest

        ports:
        - containerPort: 3001

        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://host.minikube.internal:8000"
